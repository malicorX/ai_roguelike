name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  game:
    name: Game tests and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: game
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20.20.0"
          cache: npm
          cache-dependency-path: game/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install browser
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Browser smoke
        run: npm run smoke

  eval-lab:
    name: Evaluation lab tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run eval lab tests
        run: python -m unittest discover -s eval_lab/tests

      - name: Run studio tests
        run: python -m unittest discover -s studio/tests
